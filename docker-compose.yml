version: '3.3'

services:
  db:
    image: postgres:13-alpine
    environment:
      POSTGRES_USER: linuxcheck
      POSTGRES_PASSWORD: linuxcheck
      POSTGRES_DB: linuxcheck_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linuxcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://linuxcheck:linuxcheck@db:5432/linuxcheck_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: docker-production-secret-key-change-in-production
    depends_on:
      - db
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: